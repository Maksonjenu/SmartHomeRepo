version: '3.8'

services:
  smarthome-api:
    build: .
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000;https://+:5001
    volumes:
      - ./data:/app/data
    container_name: smarthome-server
    restart: unless-stopped
